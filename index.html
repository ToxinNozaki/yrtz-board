<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>yrtz board</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0c0c0c;
      --s1: #141414;
      --s2: #1c1c1c;
      --b1: #252525;
      --b2: #333333;
      --t1: #eeeeee;
      --t2: #777777;
      --t3: #3f3f3f;
      --red: #dc2626;
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      background: var(--bg);
      color: var(--t1);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }

    /* lock screen -------------------------------------------------- */

    #lock {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity .5s ease;
    }

    #lock.out { opacity: 0; pointer-events: none; }

    .lock-inner {
      width: 340px;
      padding: 40px 36px;
      border: 1px solid var(--b1);
      background: var(--s1);
    }

    .lock-name {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--t2);
      margin-bottom: 28px;
    }

    .lock-input {
      display: block;
      width: 100%;
      padding: 11px 14px;
      background: var(--bg);
      border: 1px solid var(--b1);
      color: var(--t1);
      font-family: 'JetBrains Mono', monospace;
      font-size: 16px;
      letter-spacing: .2em;
      outline: none;
      transition: border-color .15s;
      margin-bottom: 10px;
    }

    .lock-input:focus { border-color: var(--b2); }

    .lock-input.shake {
      border-color: var(--red);
      animation: shake .35s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-7px); }
      40% { transform: translateX(7px); }
      60% { transform: translateX(-5px); }
      80% { transform: translateX(4px); }
    }

    .lock-btn {
      display: block;
      width: 100%;
      padding: 11px;
      background: var(--t1);
      color: var(--bg);
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background .15s;
    }

    .lock-btn:hover { background: #d4d4d4; }

    .lock-err {
      margin-top: 12px;
      font-size: 12px;
      color: var(--red);
      min-height: 16px;
      font-family: 'JetBrains Mono', monospace;
    }

    /* board -------------------------------------------------------- */

    #board {
      position: fixed;
      inset: 0;
      display: none;
      flex-direction: column;
      overflow: hidden;
    }

    #board.on { display: flex; }

    .board-header {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 0 28px;
      height: 52px;
      border-bottom: 1px solid var(--b1);
      background: var(--bg);
      flex-shrink: 0;
    }

    .board-title {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: .04em;
      flex-shrink: 0;
    }

    .board-count {
      font-size: 12px;
      color: var(--t2);
      font-family: 'JetBrains Mono', monospace;
      flex: 1;
    }

    .admin-badge {
      display: none;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--red);
      border: 1px solid var(--red);
      padding: 2px 7px;
    }

    .sort-group {
      display: flex;
      gap: 2px;
    }

    .sort-btn {
      padding: 5px 12px;
      background: none;
      border: 1px solid transparent;
      color: var(--t2);
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      cursor: pointer;
      transition: color .15s, border-color .15s;
    }

    .sort-btn:hover { color: var(--t1); }

    .sort-btn.on {
      color: var(--t1);
      border-color: var(--b2);
      background: var(--s1);
    }

    .new-btn {
      padding: 7px 16px;
      background: var(--t1);
      color: var(--bg);
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .06em;
      cursor: pointer;
      flex-shrink: 0;
      transition: background .15s;
    }

    .new-btn:hover { background: #d4d4d4; }

    /* notes -------------------------------------------------------- */

    .notes-area {
      display: flex;
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    .notes-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 28px;
      scrollbar-width: thin;
      scrollbar-color: var(--b2) transparent;
    }

    .notes-scroll::-webkit-scrollbar { width: 4px; }
    .notes-scroll::-webkit-scrollbar-thumb { background: var(--b2); }

    .notes-grid {
      columns: 3 260px;
      column-gap: 16px;
    }

    /* card --------------------------------------------------------- */

    .card {
      break-inside: avoid;
      margin-bottom: 16px;
      background: var(--s1);
      border: 1px solid var(--b1);
      position: relative;
      animation: card-in .3s ease both;
      transition: border-color .2s;
    }

    .card:hover { border-color: var(--b2); }

    @keyframes card-in {
      from { opacity: 0; transform: translateY(12px) rotate(var(--r)); }
      to   { opacity: 1; transform: translateY(0)    rotate(var(--r)); }
    }

    .card-body { padding: 16px 16px 12px; }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .card-author {
      font-size: 12px;
      font-weight: 600;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-time {
      font-size: 11px;
      color: var(--t2);
      font-family: 'JetBrains Mono', monospace;
      flex-shrink: 0;
    }

    .card-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .card-action-btn {
      background: none;
      border: none;
      color: var(--t3);
      cursor: pointer;
      font-size: 13px;
      padding: 1px 3px;
      transition: color .15s;
      line-height: 1;
      display: none;
    }

    .card:hover .card-action-btn.show-on-hover { display: block; }
    .card-action-btn.always { display: block; }

    .card-action-btn:hover { color: var(--t1); }
    .card-action-btn.del:hover { color: var(--red); }
    .card-action-btn.confirm { color: var(--red); display: block; }

    .card-title {
      font-size: 14px;
      font-weight: 700;
      line-height: 1.35;
      margin-bottom: 6px;
    }

    .card-desc {
      font-size: 13px;
      color: var(--t2);
      line-height: 1.65;
      word-break: break-word;
      white-space: pre-wrap;
    }

    /* card images */

    .card-imgs {
      display: grid;
      gap: 1px;
      margin-top: 12px;
    }

    .card-imgs.n1 { grid-template-columns: 1fr; }
    .card-imgs.n2 { grid-template-columns: 1fr 1fr; }
    .card-imgs.n3 { grid-template-columns: 1fr 1fr; }
    .card-imgs.n3 img:first-child { grid-column: 1 / -1; }

    .card-imgs img {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      display: block;
      cursor: zoom-in;
      transition: opacity .15s;
    }

    .card-imgs img:hover { opacity: .85; }

    /* card footer */

    .card-footer {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 4px;
      padding: 10px 12px;
      border-top: 1px solid var(--b1);
    }

    .rxn-btn {
      padding: 3px 8px;
      background: none;
      border: 1px solid transparent;
      color: var(--t2);
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      cursor: pointer;
      transition: color .15s, border-color .15s, background .15s;
      white-space: nowrap;
    }

    .rxn-btn:hover {
      color: var(--t1);
      border-color: var(--b1);
    }

    .rxn-btn.on {
      color: var(--t1);
      border-color: var(--b2);
      background: var(--s2);
      font-weight: 500;
    }

    .rxn-btn.on-nah {
      color: var(--red);
      border-color: color-mix(in srgb, var(--red) 40%, transparent);
      background: color-mix(in srgb, var(--red) 8%, transparent);
      font-weight: 500;
    }

    .rxn-sep {
      width: 1px;
      height: 14px;
      background: var(--b1);
      margin: 0 2px;
    }

    .thread-btn {
      margin-left: auto;
      padding: 3px 8px;
      background: none;
      border: 1px solid transparent;
      color: var(--t2);
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
    }

    .thread-btn:hover, .thread-btn.open {
      color: var(--t1);
      border-color: var(--b2);
      background: var(--s2);
    }

    /* empty / loading */

    .empty {
      padding: 80px 20px;
      text-align: center;
      color: var(--t2);
      font-size: 13px;
    }

    .dots {
      display: flex;
      gap: 6px;
      justify-content: center;
      padding: 80px;
    }

    .dots span {
      width: 6px;
      height: 6px;
      background: var(--b2);
      animation: pulse 1.2s ease infinite;
    }

    .dots span:nth-child(2) { animation-delay: .2s; }
    .dots span:nth-child(3) { animation-delay: .4s; }

    @keyframes pulse {
      0%, 100% { opacity: .2; }
      50% { opacity: 1; }
    }

    /* thread panel ------------------------------------------------- */

    .thread {
      width: 360px;
      border-left: 1px solid var(--b1);
      background: var(--bg);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      transform: translateX(100%);
      transition: transform .3s ease;
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      z-index: 10;
    }

    .thread.open { transform: translateX(0); }

    .thread-top {
      padding: 14px 16px;
      border-bottom: 1px solid var(--b1);
      flex-shrink: 0;
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .thread-info { flex: 1; min-width: 0; }

    .thread-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--t2);
      margin-bottom: 3px;
    }

    .thread-post-title {
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .thread-x {
      background: none;
      border: none;
      color: var(--t2);
      font-size: 18px;
      cursor: pointer;
      line-height: 1;
      padding: 1px;
      transition: color .15s;
      flex-shrink: 0;
    }

    .thread-x:hover { color: var(--t1); }

    .thread-msgs {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scrollbar-width: thin;
      scrollbar-color: var(--b2) transparent;
    }

    .thread-msgs::-webkit-scrollbar { width: 3px; }
    .thread-msgs::-webkit-scrollbar-thumb { background: var(--b2); }

    .msg { display: flex; flex-direction: column; gap: 3px; }

    .msg-head {
      display: flex;
      gap: 8px;
      align-items: baseline;
    }

    .msg-author {
      font-size: 12px;
      font-weight: 600;
    }

    .msg-time {
      font-size: 10px;
      color: var(--t2);
      font-family: 'JetBrains Mono', monospace;
    }

    .msg-text {
      font-size: 13px;
      color: rgba(238,238,238,.8);
      line-height: 1.6;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .thread-empty {
      color: var(--t2);
      font-size: 12px;
      text-align: center;
      padding: 30px;
    }

    .thread-compose {
      padding: 12px 14px;
      border-top: 1px solid var(--b1);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .thread-name {
      width: 100%;
      padding: 8px 11px;
      background: var(--s1);
      border: 1px solid var(--b1);
      color: var(--t1);
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      outline: none;
      transition: border-color .15s;
    }

    .thread-name:focus { border-color: var(--b2); }

    .thread-row { display: flex; gap: 8px; }

    .thread-ta {
      flex: 1;
      padding: 9px 11px;
      background: var(--s1);
      border: 1px solid var(--b1);
      color: var(--t1);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      line-height: 1.5;
      resize: none;
      height: 68px;
      outline: none;
      transition: border-color .15s;
    }

    .thread-ta:focus { border-color: var(--b2); }

    .thread-send {
      padding: 0 16px;
      background: var(--t1);
      border: none;
      color: var(--bg);
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      flex-shrink: 0;
      transition: background .15s;
    }

    .thread-send:hover { background: #d4d4d4; }
    .thread-send:disabled { opacity: .4; cursor: not-allowed; }

    /* modal -------------------------------------------------------- */

    .overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(0,0,0,.8);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s;
    }

    .overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      width: 500px;
      max-width: calc(100vw - 32px);
      max-height: calc(100vh - 48px);
      overflow-y: auto;
      background: var(--s1);
      border: 1px solid var(--b1);
      padding: 28px;
      transform: translateY(10px);
      transition: transform .25s ease;
      scrollbar-width: thin;
      scrollbar-color: var(--b2) transparent;
    }

    .modal::-webkit-scrollbar { width: 4px; }
    .modal::-webkit-scrollbar-thumb { background: var(--b2); }
    .overlay.open .modal { transform: translateY(0); }

    .modal-title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 24px;
    }

    .field { margin-bottom: 16px; }

    .label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--t2);
      margin-bottom: 6px;
    }

    .inp, .ta {
      width: 100%;
      padding: 10px 13px;
      background: var(--bg);
      border: 1px solid var(--b1);
      color: var(--t1);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color .15s;
    }

    .inp:focus, .ta:focus { border-color: var(--b2); }
    .inp.err, .ta.err { border-color: var(--red); }

    .ta { height: 100px; resize: none; line-height: 1.6; }

    /* image upload */

    .drop-zone {
      border: 1px dashed var(--b2);
      padding: 20px;
      text-align: center;
      cursor: pointer;
      position: relative;
      transition: border-color .15s, background .15s;
    }

    .drop-zone:hover, .drop-zone.over { border-color: var(--t2); background: var(--s2); }

    .drop-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }

    .drop-text { font-size: 13px; color: var(--t2); }
    .drop-text strong { color: var(--t1); }
    .drop-hint { font-size: 11px; color: var(--t3); margin-top: 4px; }

    .previews { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-top: 8px; }

    .preview-wrap {
      position: relative;
      aspect-ratio: 16/9;
      background: var(--s2);
      overflow: hidden;
    }

    .preview-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .preview-rm {
      position: absolute;
      top: 3px;
      right: 3px;
      width: 20px;
      height: 20px;
      background: rgba(0,0,0,.8);
      border: none;
      color: var(--t1);
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .15s;
    }

    .preview-rm:hover { background: var(--red); }

    .up-prog {
      font-size: 11px;
      color: var(--t2);
      font-family: 'JetBrains Mono', monospace;
      margin-top: 6px;
      min-height: 15px;
    }

    /* modal footer */

    .modal-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 20px;
    }

    .cd-msg {
      font-size: 11px;
      color: var(--t2);
      font-family: 'JetBrains Mono', monospace;
    }

    .btn-row { display: flex; gap: 8px; }

    .btn-cancel {
      padding: 9px 18px;
      background: none;
      border: 1px solid var(--b1);
      color: var(--t2);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      cursor: pointer;
      transition: border-color .15s, color .15s;
    }

    .btn-cancel:hover { border-color: var(--b2); color: var(--t1); }

    .btn-post {
      padding: 9px 22px;
      background: var(--t1);
      border: none;
      color: var(--bg);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: background .15s;
    }

    .btn-post:hover { background: #d4d4d4; }
    .btn-post:disabled { opacity: .35; cursor: not-allowed; }

    /* lightbox ----------------------------------------------------- */

    .lb {
      position: fixed;
      inset: 0;
      z-index: 600;
      background: rgba(0,0,0,.95);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s;
    }

    .lb.open { opacity: 1; pointer-events: all; }

    .lb img {
      max-width: 92vw;
      max-height: 90vh;
      object-fit: contain;
      display: block;
    }

    /* toast -------------------------------------------------------- */

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: var(--s2);
      border: 1px solid var(--b2);
      padding: 10px 20px;
      font-size: 12px;
      color: var(--t1);
      z-index: 800;
      opacity: 0;
      white-space: nowrap;
      pointer-events: none;
      transition: transform .3s ease, opacity .3s;
      font-family: 'JetBrains Mono', monospace;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    /* admin mod trigger -------------------------------------------- */

    #mod-trigger {
      position: fixed;
      bottom: 10px;
      right: 14px;
      font-size: 10px;
      color: var(--t3);
      cursor: pointer;
      z-index: 50;
      font-family: 'JetBrains Mono', monospace;
      user-select: none;
      transition: color .2s;
      letter-spacing: .06em;
    }

    #mod-trigger:hover { color: var(--t2); }
  </style>
</head>
<body>

<!-- lock screen -->
<div id="lock">
  <div class="lock-inner">
    <div class="lock-name">yrtz board</div>
    <input type="password" class="lock-input" id="pw-input" placeholder="——————————————" autocomplete="off" spellcheck="false">
    <button class="lock-btn" id="pw-btn">enter</button>
    <div class="lock-err" id="pw-err"></div>
  </div>
</div>

<!-- board -->
<div id="board">
  <header class="board-header">
    <span class="board-title">yrtz board</span>
    <span class="board-count" id="board-count"></span>
    <span class="admin-badge" id="admin-badge">admin</span>
    <div class="sort-group">
      <button class="sort-btn on" data-s="new">newest</button>
      <button class="sort-btn" data-s="hot">most hyped</button>
      <button class="sort-btn" data-s="in">most in</button>
    </div>
    <button class="new-btn" id="new-btn">+ new idea</button>
  </header>

  <div class="notes-area">
    <div class="notes-scroll" id="notes-scroll">
      <div class="notes-grid" id="grid">
        <div class="dots"><span></span><span></span><span></span></div>
      </div>
    </div>

    <!-- thread panel -->
    <div class="thread" id="thread">
      <div class="thread-top">
        <div class="thread-info">
          <div class="thread-label">thread</div>
          <div class="thread-post-title" id="thread-title">—</div>
        </div>
        <button class="thread-x" id="thread-x">×</button>
      </div>
      <div class="thread-msgs" id="thread-msgs">
        <div class="thread-empty">nothing yet</div>
      </div>
      <div class="thread-compose">
        <input class="thread-name" id="thread-name" placeholder="your name (optional)" maxlength="30" autocomplete="off">
        <div class="thread-row">
          <textarea class="thread-ta" id="thread-ta" placeholder="say something..." maxlength="600"></textarea>
          <button class="thread-send" id="thread-send">send</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- add modal -->
<div class="overlay" id="add-modal">
  <div class="modal">
    <div class="modal-title">new idea</div>
    <div class="field">
      <label class="label">name (optional)</label>
      <input type="text" class="inp" id="f-author" placeholder="anonymous" maxlength="30" autocomplete="off">
    </div>
    <div class="field">

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

async function getFingerprint() {
  var cached = localStorage.getItem('yrtz_fp');
  if (cached) return cached;
  var raw = [
    navigator.userAgent,
    navigator.language,
    screen.width + 'x' + screen.height,
    Intl.DateTimeFormat().resolvedOptions().timeZone,
    String(navigator.hardwareConcurrency || ''),
    String(navigator.deviceMemory || ''),
  ].join('|');
  var fp = await sha256(raw);
  localStorage.setItem('yrtz_fp', fp);
  return fp;
}

      var rb = rxnCounts[b.id] || {};

function timeAgo(iso) {
  var m = Math.floor((Date.now() - new Date(iso)) / 60000);
  if (m < 1)  return 'now';
  if (m < 60) return m + 'm';
  var h = Math.floor(m / 60);
  if (h < 24) return h + 'h';
  return Math.floor(h / 24) + 'd';
}

function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function rotFor(id) {
  var n = id.charCodeAt(0) + id.charCodeAt(id.length - 1);
  return ((n % 7) - 3) * 0.45;
}

function buildImgs(urls) {
  if (!urls || !urls.length) return '';
  var n = Math.min(urls.length, 3);
  var html = '<div class="card-imgs n' + n + '">';
  urls.slice(0, 3).forEach(function(u) {
    html += '<img src="' + esc(u) + '" loading="lazy" alt="">';
  });
  return html + '</div>';
}

function buildFooter(noteId) {

  f += btn('love', r.love||0, my.love, false);

  if (tb) tb.addEventListener('click', function() { openThread(note.id, note.title || 'untitled'); });
  var eb = card.querySelector('.edit-btn');
  if (eb) eb.addEventListener('click', function() { openEdit(note); });
  var db2 = card.querySelector('.del-btn');
  if (db2) db2.addEventListener('click', function() { handleDelete(note.id, db2); });
  card.querySelectorAll('.card-imgs img').forEach(function(img) {
    img.addEventListener('click', function() { openLb(img.src); });
  });

function rebuildCard(note) {
  var card = document.querySelector('[data-id="' + note.id + '"]');
  if (!card) return;
  card.remove();
  renderNote(note);
}

function refreshFooter(noteId) {
  var card = document.querySelector('[data-id="' + noteId + '"]');
  if (!card) return;
  var old = card.querySelector('[data-foot]');
  if (old) old.remove();
  card.insertAdjacentHTML('beforeend', buildFooterFor(noteId));
  var note = allNotes.find(function(n) { return n.id === noteId; });
  card.querySelectorAll('.rxn-btn').forEach(function(b) {
    b.addEventListener('click', function() { toggleRxn(noteId, b.dataset.t); });
  });
  var tb = card.querySelector('.thread-btn');
  if (tb && note) tb.addEventListener('click', function() { openThread(noteId, note.title || 'untitled'); });

// ── reactions ─────────────────────────────────────────────────────

async function loadReactions() {
  var res = await db.from('reactions').select('note_id,type,fingerprint');
  if (!res.data) return;
  rxnCounts = {};
  myRxns    = {};
  res.data.forEach(function(r) {
    if (!rxnCounts[r.note_id]) rxnCounts[r.note_id] = {};
    rxnCounts[r.note_id][r.type] = (rxnCounts[r.note_id][r.type] || 0) + 1;
    if (r.fingerprint === myFp) {
      if (!myRxns[r.note_id]) myRxns[r.note_id] = {};
      myRxns[r.note_id][r.type] = true;
    }
  });
}

async function toggleRxn(noteId, type) {
  if (!myFp) return;
  if (!rxnCounts[noteId]) rxnCounts[noteId] = {};
  if (!myRxns[noteId])    myRxns[noteId]    = {};

  var active = !!myRxns[noteId][type];
  if (active) {
    rxnCounts[noteId][type] = Math.max(0, (rxnCounts[noteId][type] || 1) - 1);
    myRxns[noteId][type] = false;
    await db.from('reactions').delete().match({ note_id: noteId, type: type, fingerprint: myFp });
  } else {
    rxnCounts[noteId][type] = (rxnCounts[noteId][type] || 0) + 1;
    myRxns[noteId][type] = true;
    await db.from('reactions').upsert({ note_id: noteId, type: type, fingerprint: myFp }, { onConflict: 'note_id,type,fingerprint' });
  }
  refreshFooter(noteId);
}

async function loadCmtCounts() {
  var res = await db.from('comments').select('note_id');
  cmmtCounts = {};
  if (!res.data) return;
  res.data.forEach(function(r) { cmmtCounts[r.note_id] = (cmmtCounts[r.note_id] || 0) + 1; });
}

function bumpCmtCount(noteId) {
  cmmtCounts[noteId] = (cmmtCounts[noteId] || 0) + 1;
  refreshFooter(noteId);
}

// ── thread ────────────────────────────────────────────────────────

document.getElementById('thread-x').addEventListener('click', closeThread);

function openThread(noteId, title) {
  if (activeThread === noteId && document.getElementById('thread').classList.contains('open')) {
    closeThread(); return;
  }
  activeThread = noteId;
  document.getElementById('thread-title').textContent = title;
  document.getElementById('thread-msgs').innerHTML = '<div class="thread-empty">loading...</div>';
  document.getElementById('thread').classList.add('open');
  loadMsgs(noteId);
  subThread(noteId);
  // update button state
  document.querySelectorAll('.thread-btn').forEach(function(b) {
    b.classList.toggle('open', b.dataset.n === noteId);
  });
}

function closeThread() {
  document.getElementById('thread').classList.remove('open');
  activeThread = null;
  if (threadChan) { db.removeChannel(threadChan); threadChan = null; }
  document.querySelectorAll('.thread-btn').forEach(function(b) { b.classList.remove('open'); });
}

async function loadMsgs(noteId) {
  var res = await db.from('comments').select('*').eq('note_id', noteId).order('created_at', { ascending: true });
  var el  = document.getElementById('thread-msgs');
  el.innerHTML = '';
  if (!res.data || !res.data.length) {
    el.innerHTML = '<div class="thread-empty">nothing yet. start it.</div>';
    return;
  }
  res.data.forEach(function(m) { appendMsg(m); });
  el.scrollTop = el.scrollHeight;
}

function appendMsg(m) {
  var el  = document.getElementById('thread-msgs');
  var empty = el.querySelector('.thread-empty');
  if (empty) empty.remove();
  var div = document.createElement('div');
  div.className = 'msg';
  div.innerHTML =
    '<div class="msg-head">'
    + '<span class="msg-author">' + (m.author ? esc(m.author) : 'anon') + '</span>'
    + '<span class="msg-time">' + timeAgo(m.created_at) + '</span>'
    + '</div>'
    + '<div class="msg-text">' + esc(m.content) + '</div>';
  el.appendChild(div);
}

function subThread(noteId) {
  if (threadChan) { db.removeChannel(threadChan); threadChan = null; }
  threadChan = db.channel('thread-' + noteId)
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'comments', filter: 'note_id=eq.' + noteId }, function(p) {
      appendMsg(p.new);
      document.getElementById('thread-msgs').scrollTop = 9999;
    }).subscribe();
}

document.getElementById('thread-send').addEventListener('click', sendMsg);
document.getElementById('thread-ta').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
});

async function sendMsg() {
  var content = document.getElementById('thread-ta').value.trim();
  if (!content || !activeThread) return;
  var btn = document.getElementById('thread-send');
  btn.disabled = true;
  var res = await db.from('comments').insert({
    note_id:     activeThread,
    content:     content,
    author:      document.getElementById('thread-name').value.trim() || null,
    fingerprint: myFp,
  });
  btn.disabled = false;
  if (res.error) { toast('send failed'); return; }
  document.getElementById('thread-ta').value = '';
  bumpCmtCount(activeThread);
}

// ── delete (two-click confirm) ────────────────────────────────────

function handleDelete(noteId, btn) {
  if (!isAdmin) return;
  if (delConfirm[noteId]) {
    // confirmed
    clearTimeout(delConfirm[noteId]);
    delete delConfirm[noteId];
    doDelete(noteId);
  } else {
    // first click — show confirm state
    btn.textContent = 'sure?';
    btn.classList.add('confirm');
    delConfirm[noteId] = setTimeout(function() {
      btn.textContent = '×';
      btn.classList.remove('confirm');
      delete delConfirm[noteId];
    }, 3000);
  }
}

async function doDelete(noteId) {
  await db.from('comments').delete().eq('note_id', noteId);
  await db.from('reactions').delete().eq('note_id', noteId);
  await db.from('notes').delete().eq('id', noteId);
  var card = document.querySelector('[data-id="' + noteId + '"]');
  if (card) {
    card.style.opacity = '0';
    card.style.transform += ' scale(.95)';
    card.style.transition = 'opacity .2s, transform .2s';
    setTimeout(function() { card.remove(); }, 200);
  }
  allNotes = allNotes.filter(function(n) { return n.id !== noteId; });
  updateCount();
  toast('deleted');
}

document.getElementById('edit-save').addEventListener('click', async function() {
  var title = document.getElementById('edit-title').value.trim();

  document.getElementById('edit-modal').classList.remove('open');
  toast('saved');
});

// ── add modal ─────────────────────────────────────────────────────

document.getElementById('new-btn').addEventListener('click', openAdd);
document.getElementById('add-cancel').addEventListener('click', closeAdd);
document.getElementById('add-modal').addEventListener('click', function(e) { if (e.target === document.getElementById('add-modal')) closeAdd(); });

function openAdd() {
  checkCooldown();
  document.getElementById('add-modal').classList.add('open');
  setTimeout(function() { document.getElementById('f-title').focus(); }, 280);
}

function closeAdd() {
  document.getElementById('add-modal').classList.remove('open');
  document.getElementById('f-author').value = '';
  document.getElementById('f-title').value  = '';
  document.getElementById('f-desc').value   = '';
  pendingFiles.forEach(function(p) { URL.revokeObjectURL(p.local); });
  pendingFiles = [];
  document.getElementById('previews').innerHTML = '';
  document.getElementById('drop-zone').style.display = '';
  document.getElementById('up-prog').textContent = '';
  document.getElementById('add-post').textContent = 'post it';
  if (window._cdTimer) { clearInterval(window._cdTimer); window._cdTimer = null; }
}

function checkCooldown() {
  var last    = parseInt(localStorage.getItem('yrtz_last_post') || '0');
  var elapsed = Date.now() - last;
  if (elapsed < COOLDOWN) {
    startCdUI(Math.ceil((COOLDOWN - elapsed) / 1000));
  } else {
    document.getElementById('add-post').disabled = false;
    document.getElementById('cd-msg').textContent = '';
  }
}

function startCdUI(secs) {
  document.getElementById('add-post').disabled = true;
  var s = secs;
  var tick = function() { document.getElementById('cd-msg').textContent = 'cooldown — ' + s + 's'; };
  tick();
  if (window._cdTimer) clearInterval(window._cdTimer);
  window._cdTimer = setInterval(function() {
    if (--s <= 0) {
      clearInterval(window._cdTimer);
      window._cdTimer = null;
      document.getElementById('add-post').disabled = false;
      document.getElementById('cd-msg').textContent = '';
    } else tick();
  }, 1000);
}

document.getElementById('add-post').addEventListener('click', async function() {
  var title = document.getElementById('f-title').value.trim();
  if (!title) { flash(document.getElementById('f-title')); return; }

  var postBtn = document.getElementById('add-post');
  postBtn.disabled = true;
  postBtn.textContent = 'uploading...';

  var imgUrls = [];
  try { imgUrls = await uploadImgs(); } catch (e) { toast('upload failed'); postBtn.disabled = false; postBtn.textContent = 'post it'; return; }

  postBtn.textContent = 'posting...';
  var res = await db.from('notes').insert({
    title:       title,
    content:     document.getElementById('f-desc').value.trim() || null,
    author:      document.getElementById('f-author').value.trim() || null,
    color_name:  'default',
    image_urls:  imgUrls,
    fingerprint: myFp,
  });
  postBtn.textContent = 'post it';
  if (res.error) { toast('post failed'); postBtn.disabled = false; return; }
  localStorage.setItem('yrtz_last_post', String(Date.now()));
  closeAdd();
  toast('posted');
});

// ── image upload ──────────────────────────────────────────────────

var dz = document.getElementById('drop-zone');
dz.addEventListener('dragover',  function(e) { e.preventDefault(); dz.classList.add('over'); });
dz.addEventListener('dragleave', function() { dz.classList.remove('over'); });
dz.addEventListener('drop', function(e) { e.preventDefault(); dz.classList.remove('over'); handleFiles(Array.from(e.dataTransfer.files)); });
document.getElementById('file-input').addEventListener('change', function() { handleFiles(Array.from(this.files)); this.value = ''; });

function handleFiles(files) {
  var rem = MAX_IMGS - pendingFiles.length;
  if (!rem) { toast('max 3 images'); return; }
  files.filter(function(f) { return f.type.startsWith('image/'); }).slice(0, rem).forEach(function(f) {
    if (f.size > 5 * 1024 * 1024) { toast(f.name + ' is over 5mb'); return; }
    var local = URL.createObjectURL(f);
    pendingFiles.push({ file: f, local: local });
    addPreview(local, pendingFiles.length - 1);
  });
  if (pendingFiles.length >= MAX_IMGS) dz.style.display = 'none';
}

function addPreview(url, idx) {
  var wrap = document.createElement('div');
  wrap.className = 'preview-wrap';
  wrap.innerHTML = '<img src="' + url + '" alt=""><button class="preview-rm">×</button>';
  wrap.querySelector('.preview-rm').addEventListener('click', function() {
    URL.revokeObjectURL(pendingFiles[idx]?.local);
    pendingFiles.splice(idx, 1);
    document.getElementById('previews').innerHTML = '';
    pendingFiles.forEach(function(p, i) { addPreview(p.local, i); });
    dz.style.display = '';
  });
  document.getElementById('previews').appendChild(wrap);
}

async function uploadImgs() {
  if (!pendingFiles.length) return [];
  var urls = [];
  for (var i = 0; i < pendingFiles.length; i++) {
    var f    = pendingFiles[i].file;
    var ext  = f.name.split('.').pop();
    var path = Date.now() + '-' + Math.random().toString(36).slice(2) + '.' + ext;
    document.getElementById('up-prog').textContent = 'uploading ' + (i + 1) + ' of ' + pendingFiles.length + '...';
    var res = await db.storage.from('note-images').upload(path, f, { contentType: f.type });
    if (res.error) throw res.error;
    urls.push(db.storage.from('note-images').getPublicUrl(path).data.publicUrl);
  }
  document.getElementById('up-prog').textContent = '';
  return urls;
}

// ── realtime ──────────────────────────────────────────────────────

function subscribeRealtime() {
  db.channel('notes-rt')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'notes' }, function(p) {
      if (document.querySelector('[data-id="' + p.new.id + '"]')) return;
      allNotes.unshift(p.new);
      updateCount();
      if (currentSort === 'new') renderNote(p.new, true);
      toast('new idea posted');
    }).subscribe();

  db.channel('rxn-rt')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'reactions' }, async function(p) {
      var noteId = (p.new || p.old || {}).note_id;
      if (!noteId) return;
      var res = await db.from('reactions').select('type,fingerprint').eq('note_id', noteId);
      if (!res.data) return;
      rxnCounts[noteId] = {};
      if (!myRxns[noteId]) myRxns[noteId] = {};
      res.data.forEach(function(r) {
        rxnCounts[noteId][r.type] = (rxnCounts[noteId][r.type] || 0) + 1;
        if (r.fingerprint === myFp) myRxns[noteId][r.type] = true;
      });
      refreshFooter(noteId);
    }).subscribe();
}

// ── lightbox ──────────────────────────────────────────────────────

function openLb(src) {
  document.getElementById('lb-img').src = src;
  document.getElementById('lb').classList.add('open');
}
document.getElementById('lb').addEventListener('click', function() { this.classList.remove('open'); });

// ── escape key closes modals / thread ─────────────────────────────

document.addEventListener('keydown', function(e) {
  if (e.key !== 'Escape') return;
  document.getElementById('lb').classList.remove('open');
  document.getElementById('add-modal').classList.remove('open');
  document.getElementById('edit-modal').classList.remove('open');
  closeThread();
});

// ── helpers ───────────────────────────────────────────────────────

function flash(el) {
  el.classList.add('err');
  el.focus();
  setTimeout(function() { el.classList.remove('err'); }, 1500);
}

var _toastTimer;
function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(function() { t.classList.remove('show'); }, 2800);
}
</script>
