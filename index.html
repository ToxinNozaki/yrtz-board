<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YRTZ Board</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #08080f;
      --surface:      #0e0e1c;
      --surface-2:    #141428;
      --border:       #1c1c38;
      --border-light: #272750;
      --text:         #e0e0f0;
      --text-muted:   #525278;
      --accent:       #7c6aff;
      --accent-dim:   rgba(124,106,255,0.15);
      --danger:       #ff4a6a;
      --success:      #4affb4;
    }

    html, body { height: 100%; overflow: hidden; }
    body { background: var(--bg); color: var(--text); font-family: 'Space Grotesk', sans-serif; }

    /* ─── PARTICLES ─────────────────────────────────────────────────── */
    #particles { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

    /* ─── LOCK SCREEN ───────────────────────────────────────────────── */
    #lock-screen {
      position: fixed; inset: 0; z-index: 100;
      display: flex; align-items: center; justify-content: center;
      background: radial-gradient(ellipse 80% 60% at 50% 40%, #0f0f2e 0%, #08080f 70%);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    #lock-screen.dissolve { opacity: 0; transform: scale(1.03); pointer-events: none; }

    .lock-card {
      width: 380px; padding: 52px 42px 44px;
      background: rgba(255,255,255,0.025);
      border: 1px solid var(--border); border-radius: 22px;
      backdrop-filter: blur(24px); text-align: center;
      box-shadow: 0 0 80px rgba(124,106,255,0.06), 0 32px 64px rgba(0,0,0,0.5);
    }
    .lock-icon { font-size: 44px; margin-bottom: 22px; display: block; filter: drop-shadow(0 0 8px rgba(124,106,255,0.2)); }
    .lock-icon.unlock { animation: icon-unlock 0.55s cubic-bezier(0.34,1.56,0.64,1) forwards; }
    @keyframes icon-unlock {
      0%   { transform: rotate(0) scale(1);    filter: drop-shadow(0 0 8px rgba(124,106,255,0.2)); }
      30%  { transform: rotate(-14deg) scale(1.1); }
      60%  { transform: rotate(10deg) scale(1.18); }
      100% { transform: rotate(0) scale(1.22);  filter: drop-shadow(0 0 22px rgba(124,106,255,0.7)); }
    }
    .lock-title { font-size: 24px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 6px; }
    .lock-sub   { font-size: 13px; color: var(--text-muted); margin-bottom: 36px; }

    .pw-input {
      width: 100%; padding: 15px 20px; margin-bottom: 14px;
      background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 12px;
      color: var(--text); font-size: 20px; font-family: 'Space Mono', monospace;
      letter-spacing: 0.25em; text-align: center; outline: none;
      transition: border-color 0.25s, box-shadow 0.25s;
    }
    .pw-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
    .pw-input.error {
      border-color: var(--danger); box-shadow: 0 0 0 3px rgba(255,74,106,0.15);
      animation: shake 0.42s ease;
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      18%     { transform: translateX(-9px); }
      36%     { transform: translateX(9px); }
      54%     { transform: translateX(-6px); }
      72%     { transform: translateX(6px); }
      90%     { transform: translateX(-3px); }
    }

    .enter-btn {
      width: 100%; padding: 15px;
      background: var(--accent); border: none; border-radius: 12px;
      color: white; font-family: 'Space Grotesk', sans-serif;
      font-size: 13px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase;
      cursor: pointer; transition: box-shadow 0.25s, transform 0.1s;
    }
    .enter-btn:hover  { box-shadow: 0 0 32px rgba(124,106,255,0.45); }
    .enter-btn:active { transform: scale(0.98); }
    .error-msg { height: 18px; margin-top: 12px; font-size: 12px; color: var(--danger); letter-spacing: 0.04em; }

    /* ─── BOARD ─────────────────────────────────────────────────────── */
    #board { position: fixed; inset: 0; z-index: 10; display: none; flex-direction: column; overflow: hidden; }
    #board.visible { display: flex; }

    .board-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 32px;
      background: rgba(8,8,15,0.92); backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border); flex-shrink: 0; z-index: 5; position: relative;
    }
    .board-logo-title { font-size: 18px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; line-height: 1; }
    .board-logo-title em { color: var(--accent); font-style: normal; }
    .board-logo-sub { font-size: 11px; color: var(--text-muted); font-family: 'Space Mono', monospace; margin-top: 4px; }

    .add-btn {
      display: flex; align-items: center; gap: 8px; padding: 11px 22px;
      background: var(--accent); border: none; border-radius: 10px;
      color: white; font-family: 'Space Grotesk', sans-serif;
      font-size: 13px; font-weight: 700; letter-spacing: 0.04em;
      cursor: pointer; transition: box-shadow 0.25s, transform 0.1s;
    }
    .add-btn:hover  { box-shadow: 0 0 28px rgba(124,106,255,0.45); }
    .add-btn:active { transform: scale(0.97); }
    .add-btn svg { width: 15px; height: 15px; flex-shrink: 0; }

    /* ─── NOTES GRID ────────────────────────────────────────────────── */
    .notes-wrap {
      flex: 1; overflow-y: auto; padding: 36px 32px;
      scrollbar-width: thin; scrollbar-color: var(--border) transparent;
    }
    .notes-wrap::-webkit-scrollbar       { width: 5px; }
    .notes-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    .notes-grid { columns: 3 280px; column-gap: 20px; }

    /* ─── NOTE CARD ─────────────────────────────────────────────────── */
    .note-card {
      break-inside: avoid; margin-bottom: 20px;
      padding: 0; border-radius: 16px; border: 1px solid transparent;
      position: relative; overflow: hidden;
      animation: note-in 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
      transition: transform 0.28s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.28s ease;
    }
    @keyframes note-in {
      from { opacity: 0; transform: translateY(24px) rotate(var(--rot)) scale(0.9); }
      to   { opacity: 1; transform: translateY(0)    rotate(var(--rot)) scale(1);   }
    }
    .note-card:hover {
      transform: rotate(0deg) translateY(-6px) scale(1.02) !important;
      box-shadow: 0 20px 56px rgba(0,0,0,0.65), 0 0 0 1px rgba(255,255,255,0.07) !important;
      z-index: 3;
    }

    .note-body { padding: 20px 20px 16px; }

    .note-header {
      display: flex; align-items: center; gap: 9px; margin-bottom: 14px;
    }
    .note-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700; color: rgba(0,0,0,0.75); flex-shrink: 0;
    }
    .note-author { font-size: 12px; font-weight: 600; flex: 1; }
    .note-time   { font-size: 10px; color: var(--text-muted); font-family: 'Space Mono', monospace; }

    .note-title {
      font-size: 15px; font-weight: 700; line-height: 1.35;
      margin-bottom: 8px; letter-spacing: 0.01em;
    }
    .note-desc {
      font-size: 13px; line-height: 1.7;
      color: rgba(224,224,240,0.72); word-break: break-word; white-space: pre-wrap;
    }

    /* ─── NOTE IMAGES ───────────────────────────────────────────────── */
    .note-images {
      display: grid; gap: 2px;
      margin-top: 14px;
      border-radius: 0 0 14px 14px;
      overflow: hidden;
    }
    .note-images.count-1 { grid-template-columns: 1fr; }
    .note-images.count-2 { grid-template-columns: 1fr 1fr; }
    .note-images.count-3 { grid-template-columns: 1fr 1fr; grid-template-rows: auto auto; }
    .note-images.count-3 .note-img:first-child { grid-column: 1 / -1; }

    .note-img {
      width: 100%; aspect-ratio: 16/10; object-fit: cover;
      display: block; cursor: zoom-in;
      transition: opacity 0.2s;
    }
    .note-img:hover { opacity: 0.88; }

    /* ─── LOADING / EMPTY ───────────────────────────────────────────── */
    .loading-dots { display: flex; gap: 7px; justify-content: center; padding: 80px 20px; }
    .loading-dots span {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent); animation: dot-pulse 1.2s ease-in-out infinite;
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.18s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.36s; }
    @keyframes dot-pulse {
      0%,80%,100% { transform: scale(0.55); opacity: 0.25; }
      40%          { transform: scale(1);    opacity: 1; }
    }
    .empty-state { text-align: center; padding: 80px 20px; color: var(--text-muted); }
    .empty-icon  { font-size: 48px; margin-bottom: 16px; }
    .empty-state p { font-size: 14px; line-height: 1.7; }

    /* ─── MODAL ─────────────────────────────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(8,8,15,0.9); backdrop-filter: blur(10px);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.25s ease;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      width: 520px; max-width: calc(100vw - 40px);
      max-height: calc(100vh - 60px); overflow-y: auto;
      background: var(--surface); border: 1px solid var(--border); border-radius: 22px;
      padding: 34px; transform: scale(0.93) translateY(14px);
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
      box-shadow: 0 40px 80px rgba(0,0,0,0.6);
      scrollbar-width: thin; scrollbar-color: var(--border) transparent;
    }
    .modal::-webkit-scrollbar       { width: 4px; }
    .modal::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .modal-overlay.open .modal { transform: scale(1) translateY(0); }

    .modal-title { font-size: 19px; font-weight: 700; margin-bottom: 26px; letter-spacing: 0.04em; }

    .field-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; display: block;
    }
    .field-group { margin-bottom: 18px; }

    .field-input, .field-textarea {
      width: 100%;
      background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 11px;
      color: var(--text); font-family: 'Space Grotesk', sans-serif; font-size: 14px;
      outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    }
    .field-input:focus, .field-textarea:focus {
      border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim);
    }
    .field-input    { padding: 12px 16px; }
    .field-textarea { padding: 14px 16px; height: 110px; resize: none; line-height: 1.65; }

    /* ─── IMAGE UPLOAD ───────────────────────────────────────────────── */
    .img-drop-zone {
      border: 1.5px dashed var(--border-light);
      border-radius: 12px;
      padding: 22px 16px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }
    .img-drop-zone:hover,
    .img-drop-zone.dragover {
      border-color: var(--accent);
      background: var(--accent-dim);
    }
    .img-drop-zone input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }
    .drop-icon  { font-size: 26px; margin-bottom: 8px; }
    .drop-label { font-size: 13px; color: var(--text-muted); line-height: 1.5; }
    .drop-label strong { color: var(--accent); font-weight: 600; }
    .drop-note  { font-size: 11px; color: var(--text-muted); margin-top: 4px; opacity: 0.7; }

    .img-previews {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px;
    }
    .img-preview-wrap {
      position: relative; border-radius: 9px; overflow: hidden;
      aspect-ratio: 16/10; background: var(--surface-2);
      animation: note-in 0.3s ease both;
    }
    .img-preview-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .img-remove {
      position: absolute; top: 4px; right: 4px;
      width: 22px; height: 22px; border-radius: 50%;
      background: rgba(0,0,0,0.75); border: none;
      color: white; font-size: 13px; line-height: 1;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .img-remove:hover { background: var(--danger); }

    .upload-progress {
      font-size: 11px; color: var(--text-muted); font-family: 'Space Mono', monospace;
      margin-top: 8px; text-align: center; min-height: 16px;
    }

    /* ─── COLORS ────────────────────────────────────────────────────── */
    .color-picker { display: flex; gap: 10px; flex-wrap: wrap; }
    .color-swatch {
      width: 30px; height: 30px; border-radius: 50%;
      border: 2.5px solid transparent; cursor: pointer;
      transition: transform 0.18s, border-color 0.18s, box-shadow 0.18s;
      outline: none;
    }
    .color-swatch:hover   { transform: scale(1.18); }
    .color-swatch.active  { border-color: white; transform: scale(1.18); }

    /* ─── MODAL FOOTER ──────────────────────────────────────────────── */
    .modal-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 24px; gap: 12px; }
    .cooldown-msg { font-size: 11px; color: var(--text-muted); font-family: 'Space Mono', monospace; flex-shrink: 0; }
    .modal-btns   { display: flex; gap: 10px; }

    .cancel-btn {
      padding: 11px 20px; background: transparent; border: 1px solid var(--border); border-radius: 9px;
      color: var(--text-muted); font-family: 'Space Grotesk', sans-serif; font-size: 13px;
      font-weight: 500; cursor: pointer; transition: border-color 0.2s, color 0.2s;
    }
    .cancel-btn:hover { border-color: var(--border-light); color: var(--text); }

    .post-btn {
      padding: 11px 26px; background: var(--accent); border: none; border-radius: 9px;
      color: white; font-family: 'Space Grotesk', sans-serif; font-size: 13px; font-weight: 700;
      letter-spacing: 0.04em; cursor: pointer; transition: box-shadow 0.2s, opacity 0.2s;
    }
    .post-btn:hover:not(:disabled) { box-shadow: 0 0 22px rgba(124,106,255,0.45); }
    .post-btn:disabled { opacity: 0.38; cursor: not-allowed; }

    /* ─── TOAST ─────────────────────────────────────────────────────── */
    .toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface-2); border: 1px solid var(--border-light); border-radius: 10px;
      padding: 12px 22px; font-size: 13px; font-weight: 500; letter-spacing: 0.02em;
      z-index: 400; opacity: 0; white-space: nowrap; pointer-events: none;
      transition: transform 0.38s cubic-bezier(0.34,1.56,0.64,1), opacity 0.38s;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    /* ─── LIGHTBOX ──────────────────────────────────────────────────── */
    .lightbox {
      position: fixed; inset: 0; z-index: 500;
      background: rgba(0,0,0,0.92); backdrop-filter: blur(12px);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.25s;
      cursor: zoom-out;
    }
    .lightbox.open { opacity: 1; pointer-events: all; }
    .lightbox img {
      max-width: 90vw; max-height: 88vh; border-radius: 12px;
      box-shadow: 0 40px 80px rgba(0,0,0,0.8);
      transform: scale(0.94); transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }
    .lightbox.open img { transform: scale(1); }

    /* ─── LIVE DOT ───────────────────────────────────────────────────── */
    .live-dot {
      width: 7px; height: 7px; border-radius: 50%; background: var(--success);
      display: inline-block; margin-right: 5px; vertical-align: middle;
      animation: live-pulse 2s ease-in-out infinite;
    }
    @keyframes live-pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(74,255,180,0.5); }
      50%      { box-shadow: 0 0 0 5px rgba(74,255,180,0); }
    }
  </style>
</head>
<body>

<canvas id="particles"></canvas>

<!-- ─── LOCK SCREEN ──────────────────────────────────────────────────── -->
<div id="lock-screen">
  <div class="lock-card">
    <span class="lock-icon" id="lockIcon">🔒</span>
    <div class="lock-title">YRTZ Board</div>
    <div class="lock-sub">friends only, obviously</div>
    <input type="password" class="pw-input" id="pwInput"
      placeholder="••••••••••••••" autocomplete="off" spellcheck="false">
    <button class="enter-btn" id="enterBtn">Enter</button>
    <div class="error-msg" id="errorMsg"></div>
  </div>
</div>

<!-- ─── BOARD ────────────────────────────────────────────────────────── -->
<div id="board">
  <header class="board-header">
    <div>
      <div class="board-logo-title">YRTZ <em>Board</em></div>
      <div class="board-logo-sub" id="boardMeta"><span class="live-dot"></span>loading...</div>
    </div>
    <button class="add-btn" id="addBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      Add Idea
    </button>
  </header>
  <div class="notes-wrap">
    <div class="notes-grid" id="notesGrid">
      <div class="loading-dots"><span></span><span></span><span></span></div>
    </div>
  </div>
</div>

<!-- ─── ADD MODAL ────────────────────────────────────────────────────── -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title">Drop an Idea ✦</div>

    <div class="field-group">
      <label class="field-label">Your Name (optional)</label>
      <input type="text" class="field-input" id="authorInput" placeholder="anonymous" maxlength="30" autocomplete="off">
    </div>

    <div class="field-group">
      <label class="field-label">Title <span style="color:var(--danger)">*</span></label>
      <input type="text" class="field-input" id="titleInput" placeholder="what's the vibe?" maxlength="80" autocomplete="off">
    </div>

    <div class="field-group">
      <label class="field-label">Description</label>
      <textarea class="field-textarea" id="contentInput" placeholder="more details, logistics, whatever..." maxlength="800"></textarea>
    </div>

    <div class="field-group">
      <label class="field-label">Images (optional, up to 3)</label>
      <div class="img-drop-zone" id="dropZone">
        <input type="file" id="fileInput" accept="image/*" multiple>
        <div class="drop-icon">🖼️</div>
        <div class="drop-label"><strong>Click to upload</strong> or drag & drop</div>
        <div class="drop-note">JPG, PNG, GIF, WEBP — max 5MB each</div>
      </div>
      <div class="img-previews" id="imgPreviews"></div>
      <div class="upload-progress" id="uploadProgress"></div>
    </div>

    <div class="field-group">
      <label class="field-label">Color</label>
      <div class="color-picker" id="colorPicker"></div>
    </div>

    <div class="modal-footer">
      <div class="cooldown-msg" id="cooldownMsg"></div>
      <div class="modal-btns">
        <button class="cancel-btn" id="cancelBtn">Cancel</button>
        <button class="post-btn"   id="postBtn">Post It</button>
      </div>
    </div>
  </div>
</div>

<!-- ─── LIGHTBOX ──────────────────────────────────────────────────────── -->
<div class="lightbox" id="lightbox">
  <img id="lightboxImg" src="" alt="">
</div>

<div class="toast" id="toast"></div>

<!-- ─── SCRIPT ───────────────────────────────────────────────────────── -->
<script>

const SUPABASE_URL = 'https://olyyolllcomjawygiuqw.supabase.co';

/* ── State ────────────────────────────────────────────────────────────── */

let totalNotes    = 0;
let pendingFiles  = []; // { file, localUrl } — images staged before upload

/* ── Particles ────────────────────────────────────────────────────────── */
(function () {
  const canvas = document.getElementById('particles');
  const ctx    = canvas.getContext('2d');
  const pts    = [];
  const resize = () => { canvas.width = innerWidth; canvas.height = innerHeight; };
  resize();
  window.addEventListener('resize', resize);
  for (let i = 0; i < 90; i++) pts.push({
    x: Math.random()*innerWidth, y: Math.random()*innerHeight,
    r: Math.random()*1.4+0.2,   o: Math.random()*0.45+0.08,
    vx:(Math.random()-0.5)*0.22, vy:(Math.random()-0.5)*0.22,
  });
  (function tick() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    for (const p of pts) {
      p.x+=p.vx; p.y+=p.vy;
      if(p.x<0) p.x=canvas.width;  if(p.x>canvas.width)  p.x=0;
      if(p.y<0) p.y=canvas.height; if(p.y>canvas.height) p.y=0;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(124,106,255,${p.o})`; ctx.fill();
    }
    requestAnimationFrame(tick);
  })();
})();

/* ── Password ─────────────────────────────────────────────────────────── */
const lockScreen = document.getElementById('lock-screen');
const pwInput    = document.getElementById('pwInput');
const lockIcon   = document.getElementById('lockIcon');

function tryUnlock() {
  if (pwInput.value === PASSWORD) {
    lockIcon.textContent = '🔓';
    lockIcon.classList.add('unlock');
    setTimeout(() => {
      lockScreen.classList.add('dissolve');
      document.getElementById('board').classList.add('visible');
      loadNotes();
      subscribeRealtime();
    }, 680);
  } else {
    pwInput.classList.remove('error');
    void pwInput.offsetWidth;
    pwInput.classList.add('error');
    document.getElementById('errorMsg').textContent = 'wrong password, babe';
    setTimeout(() => {
      pwInput.classList.remove('error');
      document.getElementById('errorMsg').textContent = '';
    }, 1900);
    pwInput.value = '';
  }
}
document.getElementById('enterBtn').addEventListener('click', tryUnlock);
pwInput.addEventListener('keydown', e => { if (e.key === 'Enter') tryUnlock(); });

/* ── Color Picker ─────────────────────────────────────────────────────── */
const colorPickerEl = document.getElementById('colorPicker');
NOTE_COLORS.forEach((c, i) => {
  const btn = document.createElement('button');
  btn.className = `color-swatch${i===0?' active':''}`;
  btn.style.background = c.accent;
  btn.title = c.name;
  btn.addEventListener('click', () => {
    colorPickerEl.querySelectorAll('.color-swatch').forEach(el => el.classList.remove('active'));
    btn.classList.add('active');
    selectedColor = i;
  });
  colorPickerEl.appendChild(btn);
});

/* ── Image Upload UI ──────────────────────────────────────────────────── */
const dropZone    = document.getElementById('dropZone');
const fileInput   = document.getElementById('fileInput');
const imgPreviews = document.getElementById('imgPreviews');
const uploadProg  = document.getElementById('uploadProgress');

dropZone.addEventListener('dragover',  e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('dragover');
  handleFiles(Array.from(e.dataTransfer.files));
});
fileInput.addEventListener('change', () => handleFiles(Array.from(fileInput.files)));

function handleFiles(files) {
  const remaining = MAX_IMAGES - pendingFiles.length;
  if (remaining <= 0) { showToast(`max ${MAX_IMAGES} images`); return; }
  const toAdd = files.filter(f => f.type.startsWith('image/')).slice(0, remaining);
  for (const f of toAdd) {
    if (f.size > 5 * 1024 * 1024) { showToast(`${f.name} is over 5MB`); continue; }
    const localUrl = URL.createObjectURL(f);
    pendingFiles.push({ file: f, localUrl });
    addPreview(localUrl, pendingFiles.length - 1);
  }
  fileInput.value = '';
  if (pendingFiles.length >= MAX_IMAGES) dropZone.style.display = 'none';
}

function addPreview(url, idx) {
  const wrap = document.createElement('div');
  wrap.className = 'img-preview-wrap';
  wrap.dataset.idx = idx;
  wrap.innerHTML = `
    <img src="${url}" alt="preview">
    <button class="img-remove" data-idx="${idx}" title="remove">✕</button>
  `;
  wrap.querySelector('.img-remove').addEventListener('click', () => removePreview(idx));
  imgPreviews.appendChild(wrap);
}

function removePreview(idx) {
  URL.revokeObjectURL(pendingFiles[idx]?.localUrl);
  pendingFiles.splice(idx, 1);
  imgPreviews.innerHTML = '';
  pendingFiles.forEach((p, i) => addPreview(p.localUrl, i));
  dropZone.style.display = '';
}

async function uploadPendingImages() {
  if (!pendingFiles.length) return [];
  const urls = [];
  for (let i = 0; i < pendingFiles.length; i++) {
    const { file } = pendingFiles[i];
    uploadProg.textContent = `uploading image ${i+1} of ${pendingFiles.length}...`;
    const ext  = file.name.split('.').pop();
    const path = `${Date.now()}-${Math.random().toString(36).slice(2)}.${ext}`;
    const { error } = await db.storage.from('note-images').upload(path, file, { contentType: file.type });
    if (error) throw new Error(`upload failed: ${error.message}`);
    const { data } = db.storage.from('note-images').getPublicUrl(path);
    urls.push(data.publicUrl);
  }
  uploadProg.textContent = '';
  return urls;
}

/* ── Modal ────────────────────────────────────────────────────────────── */
const modalOverlay = document.getElementById('modalOverlay');
const postBtn      = document.getElementById('postBtn');
const titleInput   = document.getElementById('titleInput');
const contentInput = document.getElementById('contentInput');
const authorInput  = document.getElementById('authorInput');
const cooldownMsg  = document.getElementById('cooldownMsg');

document.getElementById('addBtn').addEventListener('click', openModal);
document.getElementById('cancelBtn').addEventListener('click', closeModal);
modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

function openModal() {
  checkCooldown();
  modalOverlay.classList.add('open');
  setTimeout(() => titleInput.focus(), 320);
}

function closeModal() {
  if (!modalOverlay.classList.contains('open')) return;
  modalOverlay.classList.remove('open');
  titleInput.value   = '';
  contentInput.value = '';
  authorInput.value  = '';
  pendingFiles.forEach(p => URL.revokeObjectURL(p.localUrl));
  pendingFiles = [];
  imgPreviews.innerHTML = '';
  dropZone.style.display = '';
  uploadProg.textContent = '';
  postBtn.textContent = 'Post It';
  if (cooldownTimer) { clearInterval(cooldownTimer); cooldownTimer = null; }
}

function checkCooldown() {
  const elapsed = Date.now() - parseInt(localStorage.getItem('yrtz_last_post')||'0');
  if (elapsed < COOLDOWN_MS) beginCooldownUI(Math.ceil((COOLDOWN_MS-elapsed)/1000));
  else { postBtn.disabled = false; cooldownMsg.textContent = ''; }
}

function beginCooldownUI(secs) {
  postBtn.disabled = true;
  let s = secs;
  const tick = () => { cooldownMsg.textContent = `cooldown — ${s}s`; };
  tick();
  if (cooldownTimer) clearInterval(cooldownTimer);
  cooldownTimer = setInterval(() => {
    if (--s <= 0) { clearInterval(cooldownTimer); cooldownTimer = null; postBtn.disabled = false; cooldownMsg.textContent = ''; }
    else tick();
  }, 1000);
}

postBtn.addEventListener('click', async () => {
  const title   = titleInput.value.trim();
  const content = contentInput.value.trim();

  if (!title) {
    titleInput.style.borderColor = 'var(--danger)';
    titleInput.style.boxShadow   = '0 0 0 3px rgba(255,74,106,0.15)';
    titleInput.focus();
    setTimeout(() => { titleInput.style.borderColor=''; titleInput.style.boxShadow=''; }, 1600);
    return;
  }

  postBtn.disabled    = true;
  postBtn.textContent = 'Uploading...';

  let imageUrls = [];
  try {
    imageUrls = await uploadPendingImages();
  } catch (err) {
    showToast('image upload failed — try again');
    postBtn.disabled    = false;
    postBtn.textContent = 'Post It';
    return;
  }

  postBtn.textContent = 'Posting...';
  const { error } = await db.from('notes').insert({
    title,
    content:    content || null,
    author:     authorInput.value.trim() || null,
    color_name: NOTE_COLORS[selectedColor].name,
    image_urls: imageUrls,
  });

  postBtn.textContent = 'Post It';

  if (error) {
    showToast('something went wrong — try again');
    postBtn.disabled = false;
    return;
  }

  localStorage.setItem('yrtz_last_post', String(Date.now()));
  closeModal();
  showToast('idea posted ✦');
});

/* ── Notes ────────────────────────────────────────────────────────────── */
const notesGrid = document.getElementById('notesGrid');
const boardMeta = document.getElementById('boardMeta');

function colorByName(n) { return NOTE_COLORS.find(c => c.name===n) || NOTE_COLORS[0]; }
function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function timeAgo(iso) {
  const m = Math.floor((Date.now()-new Date(iso))/60000);
  if (m<1)  return 'just now';
  if (m<60) return `${m}m ago`;
  const h = Math.floor(m/60);
  if (h<24) return `${h}h ago`;
  return `${Math.floor(h/24)}d ago`;
}
function initials(name) {
  if (!name) return '?';
  return name.trim().split(/\s+/).map(w=>w[0]).join('').toUpperCase().slice(0,2);
}
function rotFromId(id) {
  const a = id.charCodeAt(0)+id.charCodeAt(1);
  return ((a+id.charCodeAt(id.length-1))%9-4)*0.65;
}

function buildImagesHtml(urls) {
  if (!urls || !urls.length) return '';
  const count = Math.min(urls.length, 3);
  const imgs  = urls.slice(0,3).map(u =>
    `<img class="note-img" src="${escHtml(u)}" alt="idea image" loading="lazy">`
  ).join('');
  return `<div class="note-images count-${count}">${imgs}</div>`;
}

function renderNote(note, prepend=false) {
  const c   = colorByName(note.color_name);
  const rot = rotFromId(note.id);

  const card = document.createElement('div');
  card.className  = 'note-card';
  card.dataset.id = note.id;
  card.style.cssText = [
    `--rot:${rot}deg`,
    `transform:rotate(${rot}deg)`,
    `background:${c.bg}`,
    `border-color:${c.border}`,
    `box-shadow:0 4px 22px rgba(0,0,0,0.45),inset 0 1px 0 rgba(255,255,255,0.04)`,
  ].join(';');

  card.innerHTML = `
    <div class="note-body">
      <div class="note-header">
        <div class="note-avatar" style="background:${c.accent}">${initials(note.author)}</div>
        <div class="note-author">${note.author ? escHtml(note.author) : 'anonymous'}</div>
        <div class="note-time">${timeAgo(note.created_at)}</div>
      </div>
      <div class="note-title">${escHtml(note.title || '')}</div>
      ${note.content ? `<div class="note-desc">${escHtml(note.content)}</div>` : ''}
    </div>
    ${buildImagesHtml(note.image_urls)}
  `;

  // image click → lightbox
  card.querySelectorAll('.note-img').forEach(img => {
    img.addEventListener('click', () => openLightbox(img.src));
  });

  const empty = notesGrid.querySelector('.empty-state, .loading-dots');
  if (empty) empty.remove();

  if (prepend && notesGrid.firstChild) notesGrid.insertBefore(card, notesGrid.firstChild);
  else notesGrid.appendChild(card);

  totalNotes++;
  updateMeta();
}

function updateMeta() {
  boardMeta.innerHTML = `<span class="live-dot"></span>${totalNotes} idea${totalNotes!==1?'s':''} on the board`;
}

async function loadNotes() {
  const { data, error } = await db.from('notes').select('*').order('created_at', { ascending:false });
  notesGrid.innerHTML = '';
  totalNotes = 0;

  if (error || !data) {
    notesGrid.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><p>couldn't reach the board.<br>try refreshing.</p></div>`;
    return;
  }
  if (!data.length) {
    notesGrid.innerHTML = `<div class="empty-state"><div class="empty-icon">💡</div><p>nothing here yet.<br>drop the first idea.</p></div>`;
    boardMeta.innerHTML = `<span class="live-dot"></span>0 ideas on the board`;
    return;
  }
  data.forEach((note, i) => setTimeout(() => renderNote(note), i*45));
}

function subscribeRealtime() {
  db.channel('public:notes')
    .on('postgres_changes', { event:'INSERT', schema:'public', table:'notes' }, payload => {
      if (document.querySelector(`[data-id="${payload.new.id}"]`)) return;
      renderNote(payload.new, true);
      showToast('new idea just dropped ✦');
    }).subscribe();
}

/* ── Lightbox ─────────────────────────────────────────────────────────── */
const lightbox    = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightboxImg');

function openLightbox(src) {
  lightboxImg.src = src;
  lightbox.classList.add('open');
}
lightbox.addEventListener('click', () => lightbox.classList.remove('open'));
document.addEventListener('keydown', e => { if (e.key==='Escape') lightbox.classList.remove('open'); });

/* ── Toast ────────────────────────────────────────────────────────────── */
const toastEl = document.getElementById('toast');
let toastTimer;
function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), 3000);
}
</script>
