<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YRTZ Board</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#08080f;--surface:#0e0e1c;--surface-2:#141428;
      --border:#1c1c38;--border-light:#272750;
      --text:#e0e0f0;--text-muted:#525278;
      --accent:#7c6aff;--accent-dim:rgba(124,106,255,.15);
      --danger:#ff4a6a;--success:#4affb4;
    }
    html,body{height:100%;overflow:hidden}
    body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif}

    /* ── PARTICLES ──────────────────────────────────────── */
    #particles{position:fixed;inset:0;z-index:0;pointer-events:none}

    /* ── LOCK SCREEN ─────────────────────────────────────── */
    #lock-screen{
      position:fixed;inset:0;z-index:100;
      display:flex;align-items:center;justify-content:center;
      background:radial-gradient(ellipse 80% 60% at 50% 40%,#0f0f2e,#08080f 70%);
      transition:opacity .7s ease,transform .7s ease;
    }
    #lock-screen.dissolve{opacity:0;transform:scale(1.03);pointer-events:none}
    .lock-card{
      width:380px;padding:52px 42px 44px;
      background:rgba(255,255,255,.025);border:1px solid var(--border);border-radius:22px;
      backdrop-filter:blur(24px);text-align:center;
      box-shadow:0 0 80px rgba(124,106,255,.06),0 32px 64px rgba(0,0,0,.5);
    }
    .lock-icon{font-size:44px;margin-bottom:22px;display:block;filter:drop-shadow(0 0 8px rgba(124,106,255,.2))}
    .lock-icon.unlock{animation:icon-unlock .55s cubic-bezier(.34,1.56,.64,1) forwards}
    @keyframes icon-unlock{
      0%{transform:rotate(0) scale(1);filter:drop-shadow(0 0 8px rgba(124,106,255,.2))}
      30%{transform:rotate(-14deg) scale(1.1)}60%{transform:rotate(10deg) scale(1.18)}
      100%{transform:rotate(0) scale(1.22);filter:drop-shadow(0 0 22px rgba(124,106,255,.7))}
    }
    .lock-title{font-size:24px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px}
    .lock-sub{font-size:13px;color:var(--text-muted);margin-bottom:36px}
    .pw-input{
      width:100%;padding:15px 20px;margin-bottom:14px;
      background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:12px;
      color:var(--text);font-size:20px;font-family:'Space Mono',monospace;
      letter-spacing:.25em;text-align:center;outline:none;
      transition:border-color .25s,box-shadow .25s;
    }
    .pw-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim)}
    .pw-input.error{border-color:var(--danger);box-shadow:0 0 0 3px rgba(255,74,106,.15);animation:shake .42s ease}
    @keyframes shake{0%,100%{transform:translateX(0)}18%{transform:translateX(-9px)}36%{transform:translateX(9px)}54%{transform:translateX(-6px)}72%{transform:translateX(6px)}90%{transform:translateX(-3px)}}
    .enter-btn{
      width:100%;padding:15px;background:var(--accent);border:none;border-radius:12px;
      color:#fff;font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;
      letter-spacing:.14em;text-transform:uppercase;cursor:pointer;
      transition:box-shadow .25s,transform .1s;
    }
    .enter-btn:hover{box-shadow:0 0 32px rgba(124,106,255,.45)}.enter-btn:active{transform:scale(.98)}
    .error-msg{height:18px;margin-top:12px;font-size:12px;color:var(--danger);letter-spacing:.04em}

    /* ── BOARD ───────────────────────────────────────────── */
    #board{position:fixed;inset:0;z-index:10;display:none;flex-direction:column;overflow:hidden}
    #board.visible{display:flex}
    .board-header{
      display:flex;align-items:center;justify-content:space-between;padding:16px 32px;
      background:rgba(8,8,15,.92);backdrop-filter:blur(24px);
      border-bottom:1px solid var(--border);flex-shrink:0;z-index:20;position:relative;
    }
    .board-logo-title{font-size:18px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;line-height:1}
    .board-logo-title em{color:var(--accent);font-style:normal}
    .board-logo-sub{font-size:11px;color:var(--text-muted);font-family:'Space Mono',monospace;margin-top:4px}
    .add-btn{
      display:flex;align-items:center;gap:8px;padding:10px 20px;
      background:var(--accent);border:none;border-radius:10px;color:#fff;
      font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;
      letter-spacing:.04em;cursor:pointer;transition:box-shadow .25s,transform .1s;
    }
    .add-btn:hover{box-shadow:0 0 28px rgba(124,106,255,.45)}.add-btn:active{transform:scale(.97)}
    .add-btn svg{width:15px;height:15px;flex-shrink:0}

    /* ── SORT BAR ─────────────────────────────────────────── */
    .sort-bar{
      display:flex;align-items:center;gap:6px;padding:10px 32px;
      background:rgba(8,8,15,.7);border-bottom:1px solid var(--border);
      flex-shrink:0;
    }
    .sort-label{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted);margin-right:4px}
    .sort-btn{
      padding:5px 13px;background:transparent;border:1px solid var(--border);border-radius:20px;
      color:var(--text-muted);font-family:'Space Grotesk',sans-serif;font-size:12px;
      cursor:pointer;transition:all .2s;white-space:nowrap;
    }
    .sort-btn:hover{border-color:var(--border-light);color:var(--text)}
    .sort-btn.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);font-weight:600}

    /* ── NOTES AREA ──────────────────────────────────────── */
    .board-body{display:flex;flex:1;overflow:hidden;position:relative}
    .notes-wrap{
      flex:1;overflow-y:auto;padding:32px;
      scrollbar-width:thin;scrollbar-color:var(--border) transparent;
      transition:margin-right .35s ease;
    }
    .notes-wrap::-webkit-scrollbar{width:5px}
    .notes-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
    .notes-grid{columns:3 260px;column-gap:20px}

    /* ── NOTE CARD ───────────────────────────────────────── */
    .note-card{
      break-inside:avoid;margin-bottom:20px;border-radius:16px;
      border:1px solid transparent;position:relative;overflow:hidden;
      animation:note-in .5s cubic-bezier(.34,1.56,.64,1) both;
      transition:transform .28s cubic-bezier(.34,1.56,.64,1),box-shadow .28s ease;
    }
    @keyframes note-in{
      from{opacity:0;transform:translateY(24px) rotate(var(--rot)) scale(.9)}
      to{opacity:1;transform:translateY(0) rotate(var(--rot)) scale(1)}
    }
    .note-card:hover{transform:rotate(0deg) translateY(-5px) scale(1.02) !important;box-shadow:0 20px 56px rgba(0,0,0,.65),0 0 0 1px rgba(255,255,255,.07) !important;z-index:3}
    .note-body{padding:18px 18px 14px}
    .note-header{display:flex;align-items:center;gap:8px;margin-bottom:12px}
    .note-avatar{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:rgba(0,0,0,.75);flex-shrink:0}
    .note-author{font-size:12px;font-weight:600;flex:1}
    .note-time{font-size:10px;color:var(--text-muted);font-family:'Space Mono',monospace}
    .note-edit-btn{
      background:none;border:none;cursor:pointer;padding:3px;
      color:var(--text-muted);opacity:0;transition:opacity .2s,color .2s;font-size:13px;line-height:1;
    }
    .note-card:hover .note-edit-btn{opacity:1}
    .note-edit-btn:hover{color:var(--accent)}
    .note-title{font-size:15px;font-weight:700;line-height:1.35;margin-bottom:7px;letter-spacing:.01em}
    .note-desc{font-size:13px;line-height:1.7;color:rgba(224,224,240,.72);word-break:break-word;white-space:pre-wrap}

    /* ── NOTE IMAGES ──────────────────────────────────────── */
    .note-images{display:grid;gap:2px;margin-top:12px}
    .note-images.count-1{grid-template-columns:1fr}
    .note-images.count-2{grid-template-columns:1fr 1fr}
    .note-images.count-3{grid-template-columns:1fr 1fr;grid-template-rows:auto auto}
    .note-images.count-3 .note-img:first-child{grid-column:1/-1}
    .note-img{width:100%;aspect-ratio:16/10;object-fit:cover;display:block;cursor:zoom-in;transition:opacity .2s}
    .note-img:hover{opacity:.88}

    /* ── NOTE FOOTER (reactions + discuss) ─────────────────── */
    .note-footer{
      display:flex;align-items:center;gap:6px;padding:10px 14px;
      border-top:1px solid rgba(255,255,255,.05);flex-wrap:wrap;
    }
    .reaction-btn{
      display:inline-flex;align-items:center;gap:4px;
      padding:4px 9px;border-radius:20px;border:1px solid transparent;
      background:rgba(255,255,255,.04);cursor:pointer;
      font-family:'Space Grotesk',sans-serif;font-size:12px;
      color:var(--text-muted);transition:all .18s;user-select:none;
    }
    .reaction-btn:hover{background:rgba(255,255,255,.08);color:var(--text);border-color:var(--border-light)}
    .reaction-btn.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);font-weight:600}
    .reaction-btn.active-nah{background:rgba(255,74,106,.12);border-color:rgba(255,74,106,.4);color:#ff4a6a;font-weight:600}
    .reaction-btn.active-in{background:rgba(74,255,180,.1);border-color:rgba(74,255,180,.35);color:var(--success);font-weight:600}
    .reaction-sep{width:1px;height:16px;background:var(--border);flex-shrink:0;margin:0 2px}
    .discuss-btn{
      margin-left:auto;display:inline-flex;align-items:center;gap:5px;
      padding:4px 10px;border-radius:20px;border:1px solid var(--border);
      background:transparent;cursor:pointer;
      font-family:'Space Grotesk',sans-serif;font-size:12px;color:var(--text-muted);
      transition:all .18s;
    }
    .discuss-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}

    /* ── THREAD PANEL ─────────────────────────────────────── */
    .thread-panel{
      position:absolute;right:0;top:0;bottom:0;
      width:380px;max-width:100%;
      background:var(--surface);border-left:1px solid var(--border);
      display:flex;flex-direction:column;z-index:15;
      transform:translateX(100%);transition:transform .35s cubic-bezier(.25,.46,.45,.94);
    }
    .thread-panel.open{transform:translateX(0)}
    .thread-header{
      display:flex;align-items:flex-start;gap:12px;padding:18px 20px;
      border-bottom:1px solid var(--border);flex-shrink:0;
    }
    .thread-header-info{flex:1;min-width:0}
    .thread-label{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted);margin-bottom:4px}
    .thread-note-title{font-size:14px;font-weight:700;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .thread-close{
      background:none;border:none;cursor:pointer;color:var(--text-muted);
      font-size:20px;line-height:1;padding:2px 4px;transition:color .2s;flex-shrink:0;margin-top:-2px;
    }
    .thread-close:hover{color:var(--text)}
    .thread-messages{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:12px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
    .thread-messages::-webkit-scrollbar{width:4px}
    .thread-messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
    .thread-msg{
      display:flex;flex-direction:column;gap:4px;
      animation:note-in .3s ease both;
    }
    .thread-msg-header{display:flex;align-items:center;gap:8px}
    .thread-msg-author{font-size:12px;font-weight:600;color:var(--accent)}
    .thread-msg-time{font-size:10px;color:var(--text-muted);font-family:'Space Mono',monospace}
    .thread-msg-content{font-size:13px;line-height:1.65;color:rgba(224,224,240,.85);word-break:break-word;white-space:pre-wrap;padding-left:2px}
    .thread-empty{text-align:center;padding:40px 20px;color:var(--text-muted);font-size:13px;line-height:1.6}
    .thread-compose{
      padding:14px 16px;border-top:1px solid var(--border);flex-shrink:0;
      display:flex;flex-direction:column;gap:10px;
    }
    .thread-author-input{
      width:100%;padding:9px 13px;background:rgba(255,255,255,.04);
      border:1px solid var(--border);border-radius:9px;
      color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:13px;outline:none;
      transition:border-color .2s;
    }
    .thread-author-input:focus{border-color:var(--accent)}
    .thread-compose-row{display:flex;gap:8px}
    .thread-textarea{
      flex:1;padding:10px 13px;background:rgba(255,255,255,.04);
      border:1px solid var(--border);border-radius:9px;resize:none;height:72px;
      color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:13px;
      line-height:1.55;outline:none;transition:border-color .2s;
    }
    .thread-textarea:focus{border-color:var(--accent)}
    .thread-send{
      padding:0 16px;background:var(--accent);border:none;border-radius:9px;
      color:#fff;font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;
      cursor:pointer;flex-shrink:0;transition:box-shadow .2s,opacity .2s;
    }
    .thread-send:hover{box-shadow:0 0 18px rgba(124,106,255,.4)}
    .thread-send:disabled{opacity:.4;cursor:not-allowed}

    /* ── LOADING / EMPTY ──────────────────────────────────── */
    .loading-dots{display:flex;gap:7px;justify-content:center;padding:80px 20px}
    .loading-dots span{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:dot-pulse 1.2s ease-in-out infinite}
    .loading-dots span:nth-child(2){animation-delay:.18s}.loading-dots span:nth-child(3){animation-delay:.36s}
    @keyframes dot-pulse{0%,80%,100%{transform:scale(.55);opacity:.25}40%{transform:scale(1);opacity:1}}
    .empty-state{text-align:center;padding:80px 20px;color:var(--text-muted)}
    .empty-icon{font-size:48px;margin-bottom:16px}
    .empty-state p{font-size:14px;line-height:1.7}

    /* ── ADD / EDIT MODAL ────────────────────────────────── */
    .modal-overlay{
      position:fixed;inset:0;z-index:200;
      background:rgba(8,8,15,.9);backdrop-filter:blur(10px);
      display:flex;align-items:center;justify-content:center;
      opacity:0;pointer-events:none;transition:opacity .25s ease;
    }
    .modal-overlay.open{opacity:1;pointer-events:all}
    .modal{
      width:520px;max-width:calc(100vw - 40px);max-height:calc(100vh - 60px);overflow-y:auto;
      background:var(--surface);border:1px solid var(--border);border-radius:22px;padding:34px;
      transform:scale(.93) translateY(14px);transition:transform .35s cubic-bezier(.34,1.56,.64,1);
      box-shadow:0 40px 80px rgba(0,0,0,.6);
      scrollbar-width:thin;scrollbar-color:var(--border) transparent;
    }
    .modal::-webkit-scrollbar{width:4px}.modal::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
    .modal-overlay.open .modal{transform:scale(1) translateY(0)}
    .modal-title{font-size:19px;font-weight:700;margin-bottom:26px;letter-spacing:.04em}
    .field-label{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px;display:block}
    .field-group{margin-bottom:18px}
    .field-input,.field-textarea{
      width:100%;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:11px;
      color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:14px;outline:none;
      transition:border-color .2s,box-shadow .2s;
    }
    .field-input:focus,.field-textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim)}
    .field-input{padding:12px 16px}
    .field-textarea{padding:14px 16px;height:110px;resize:none;line-height:1.65}

    /* ── IMAGE UPLOAD ────────────────────────────────────── */
    .img-drop-zone{
      border:1.5px dashed var(--border-light);border-radius:12px;padding:22px 16px;
      text-align:center;cursor:pointer;transition:border-color .2s,background .2s;position:relative;
    }
    .img-drop-zone:hover,.img-drop-zone.dragover{border-color:var(--accent);background:var(--accent-dim)}
    .img-drop-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
    .drop-icon{font-size:26px;margin-bottom:8px}
    .drop-label{font-size:13px;color:var(--text-muted);line-height:1.5}
    .drop-label strong{color:var(--accent);font-weight:600}
    .drop-note{font-size:11px;color:var(--text-muted);margin-top:4px;opacity:.7}
    .img-previews{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
    .img-preview-wrap{position:relative;border-radius:9px;overflow:hidden;aspect-ratio:16/10;background:var(--surface-2);animation:note-in .3s ease both}
    .img-preview-wrap img{width:100%;height:100%;object-fit:cover;display:block}
    .img-remove{position:absolute;top:4px;right:4px;width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,.75);border:none;color:#fff;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s}
    .img-remove:hover{background:var(--danger)}
    .upload-progress{font-size:11px;color:var(--text-muted);font-family:'Space Mono',monospace;margin-top:8px;text-align:center;min-height:16px}

    /* ── COLORS ──────────────────────────────────────────── */
    .color-picker{display:flex;gap:10px;flex-wrap:wrap}
    .color-swatch{width:30px;height:30px;border-radius:50%;border:2.5px solid transparent;cursor:pointer;transition:transform .18s,border-color .18s,box-shadow .18s;outline:none}
    .color-swatch:hover{transform:scale(1.18)}
    .color-swatch.active{border-color:#fff;transform:scale(1.18)}

    /* ── MODAL FOOTER ────────────────────────────────────── */
    .modal-footer{display:flex;align-items:center;justify-content:space-between;margin-top:24px;gap:12px}
    .cooldown-msg{font-size:11px;color:var(--text-muted);font-family:'Space Mono',monospace;flex-shrink:0}
    .modal-btns{display:flex;gap:10px}
    .cancel-btn{padding:11px 20px;background:transparent;border:1px solid var(--border);border-radius:9px;color:var(--text-muted);font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:border-color .2s,color .2s}
    .cancel-btn:hover{border-color:var(--border-light);color:var(--text)}
    .post-btn{padding:11px 26px;background:var(--accent);border:none;border-radius:9px;color:#fff;font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;letter-spacing:.04em;cursor:pointer;transition:box-shadow .2s,opacity .2s}
    .post-btn:hover:not(:disabled){box-shadow:0 0 22px rgba(124,106,255,.45)}
    .post-btn:disabled{opacity:.38;cursor:not-allowed}

    /* ── TOAST ───────────────────────────────────────────── */
    .toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface-2);border:1px solid var(--border-light);border-radius:10px;padding:12px 22px;font-size:13px;font-weight:500;z-index:500;opacity:0;white-space:nowrap;pointer-events:none;transition:transform .38s cubic-bezier(.34,1.56,.64,1),opacity .38s}
    .toast.show{transform:translateX(-50%) translateY(0);opacity:1}

    /* ── LIGHTBOX ─────────────────────────────────────────── */
    .lightbox{position:fixed;inset:0;z-index:600;background:rgba(0,0,0,.93);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s;cursor:zoom-out}
    .lightbox.open{opacity:1;pointer-events:all}
    .lightbox img{max-width:90vw;max-height:88vh;border-radius:12px;box-shadow:0 40px 80px rgba(0,0,0,.8);transform:scale(.94);transition:transform .3s cubic-bezier(.34,1.56,.64,1)}
    .lightbox.open img{transform:scale(1)}

    /* ── LIVE DOT ─────────────────────────────────────────── */
    .live-dot{width:7px;height:7px;border-radius:50%;background:var(--success);display:inline-block;margin-right:5px;vertical-align:middle;animation:live-pulse 2s ease-in-out infinite}
    @keyframes live-pulse{0%,100%{box-shadow:0 0 0 0 rgba(74,255,180,.5)}50%{box-shadow:0 0 0 5px rgba(74,255,180,0)}}
  </style>
</head>
<body>
<canvas id="particles"></canvas>

<!-- ── LOCK SCREEN ──────────────────────────────────────── -->
<div id="lock-screen">
  <div class="lock-card">
    <span class="lock-icon" id="lockIcon">🔒</span>
    <div class="lock-title">YRTZ Board</div>
    <div class="lock-sub">friends only, obviously</div>
    <input type="password" class="pw-input" id="pwInput" placeholder="••••••••••••••" autocomplete="off" spellcheck="false">
    <button class="enter-btn" id="enterBtn">Enter</button>
    <div class="error-msg" id="errorMsg"></div>
  </div>
</div>

<!-- ── BOARD ─────────────────────────────────────────────── -->
<div id="board">
  <header class="board-header">
    <div>
      <div class="board-logo-title">YRTZ <em>Board</em></div>
      <div class="board-logo-sub" id="boardMeta"><span class="live-dot"></span>loading...</div>
    </div>
    <button class="add-btn" id="addBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">

async function sha256(text) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function buildFingerprint() {
  // return cached value if available

  if (cached) return cached;
  const raw = [
    navigator.userAgent, navigator.language,
    screen.width + 'x' + screen.height + 'x' + screen.colorDepth,
    Intl.DateTimeFormat().resolvedOptions().timeZone,
    navigator.hardwareConcurrency || 0,
    navigator.platform || '',
    navigator.deviceMemory || 0,
  ].join('|');
  const fp = await sha256(raw);
  localStorage.setItem('yrtz_fp', fp);
  return fp;
}

function handleFiles(files) {
  const rem = MAX_IMAGES - pendingFiles.length;
  if (!rem) { showToast(`max ${MAX_IMAGES} images`); return; }
  for (const f of files.filter(f=>f.type.startsWith('image/')).slice(0,rem)) {
    if (f.size > 5*1024*1024) { showToast(`${f.name} over 5MB`); continue; }
    const url = URL.createObjectURL(f);
    pendingFiles.push({file:f,localUrl:url});
    addPreview(url, pendingFiles.length-1);
  }
  fileInput.value = '';
  if (pendingFiles.length >= MAX_IMAGES) dropZone.style.display = 'none';
}
function addPreview(url, idx) {
  const w = document.createElement('div');
  w.className='img-preview-wrap';w.dataset.idx=idx;
  w.innerHTML=`<img src="${url}" alt=""><button class="img-remove" title="remove">✕</button>`;
  w.querySelector('.img-remove').addEventListener('click',()=>removePreview(idx));
  imgPreviews.appendChild(w);
}
function removePreview(idx) {
  URL.revokeObjectURL(pendingFiles[idx]?.localUrl);
  pendingFiles.splice(idx,1);
  imgPreviews.innerHTML='';
  pendingFiles.forEach((p,i)=>addPreview(p.localUrl,i));
  dropZone.style.display='';
}
async function uploadPendingImages() {
  if (!pendingFiles.length) return [];
  const urls=[];
  for (let i=0;i<pendingFiles.length;i++) {
    const {file}=pendingFiles[i];
    uploadProg.textContent=`uploading image ${i+1} of ${pendingFiles.length}...`;
    const ext=file.name.split('.').pop();
    const path=`${Date.now()}-${Math.random().toString(36).slice(2)}.${ext}`;
    const {error}=await db.storage.from('note-images').upload(path,file,{contentType:file.type});
    if (error) throw new Error(error.message);
    const {data}=db.storage.from('note-images').getPublicUrl(path);
    urls.push(data.publicUrl);
  }
  uploadProg.textContent='';
  return urls;
}

function colorByName(n){ return NOTE_COLORS.find(c=>c.name===n)||NOTE_COLORS[0]; }
function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function timeAgo(iso){ const m=Math.floor((Date.now()-new Date(iso))/60000); if(m<1) return 'just now'; if(m<60) return `${m}m ago`; const h=Math.floor(m/60); if(h<24) return `${h}h ago`; return `${Math.floor(h/24)}d ago`; }
function initials(n){ if(!n) return '?'; return n.trim().split(/\s+/).map(w=>w[0]).join('').toUpperCase().slice(0,2); }
function rotFromId(id){ const a=id.charCodeAt(0)+id.charCodeAt(1); return ((a+id.charCodeAt(id.length-1))%9-4)*.65; }

function buildImagesHtml(urls) {
  if (!urls?.length) return '';
  const n=Math.min(urls.length,3);
  const imgs=urls.slice(0,3).map(u=>`<img class="note-img" src="${escHtml(u)}" alt="" loading="lazy">`).join('');
  return `<div class="note-images count-${n}">${imgs}</div>`;
}

function buildFooterHtml(noteId) {
  const r  = reactionCounts[noteId] || {};
  const my = myReactions[noteId]    || {};
  const cc = commentCounts[noteId]  || 0;
  return `
    <div class="note-footer">
      <button class="reaction-btn${my.fire?' active':''}" data-note="${noteId}" data-type="fire">🔥 <span>${r.fire||0}</span></button>
      <button class="reaction-btn${my.heart?' active':''}" data-note="${noteId}" data-type="heart">❤️ <span>${r.heart||0}</span></button>
      <button class="reaction-btn${my.eyes?' active':''}" data-note="${noteId}" data-type="eyes">👀 <span>${r.eyes||0}</span></button>
      <div class="reaction-sep"></div>
      <button class="reaction-btn${my.in?' active-in':''}" data-note="${noteId}" data-type="in">✅ <span>${r.in||0}</span></button>
      <button class="reaction-btn${my.nah?' active-nah':''}" data-note="${noteId}" data-type="nah">👎 <span>${r.nah||0}</span></button>
      <button class="discuss-btn" data-note="${noteId}" data-title="">💬 <span>${cc}</span></button>
    </div>`;
}

function renderNote(note, prepend=false) {
  const c   = colorByName(note.color_name);
  const rot = rotFromId(note.id);
  const isOwn = myFingerprint && note.fingerprint === myFingerprint;

  const card = document.createElement('div');
  card.className='note-card'; card.dataset.id=note.id;
  card.style.cssText=`--rot:${rot}deg;transform:rotate(${rot}deg);background:${c.bg};border-color:${c.border};box-shadow:0 4px 22px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.04)`;

  card.innerHTML=`
    <div class="note-body">
      <div class="note-header">
        <div class="note-avatar" style="background:${c.accent}">${initials(note.author)}</div>
        <div class="note-author">${note.author?escHtml(note.author):'anonymous'}</div>
        <div class="note-time">${timeAgo(note.created_at)}</div>
        ${isOwn?`<button class="note-edit-btn" title="edit your note" data-id="${note.id}">✎</button>`:''}
      </div>
      <div class="note-title">${escHtml(note.title||'')}</div>
      ${note.content?`<div class="note-desc">${escHtml(note.content)}</div>`:''}
    </div>
    ${buildImagesHtml(note.image_urls)}
    ${buildFooterHtml(note.id)}
  `;

  // set discuss button title
  card.querySelector('.discuss-btn').dataset.title = note.title || '';

  // wire up interactions
  card.querySelectorAll('.note-img').forEach(img=>img.addEventListener('click',()=>openLightbox(img.src)));
  card.querySelectorAll('.reaction-btn').forEach(btn=>btn.addEventListener('click',()=>toggleReaction(note.id, btn.dataset.type)));
  card.querySelector('.discuss-btn')?.addEventListener('click',()=>openThread(note.id, note.title||'untitled'));
  card.querySelector('.note-edit-btn')?.addEventListener('click',()=>openEditModal(note));

  const empty=notesGrid.querySelector('.empty-state,.loading-dots');
  if (empty) empty.remove();

  if (prepend && notesGrid.firstChild) notesGrid.insertBefore(card, notesGrid.firstChild);
  else notesGrid.appendChild(card);
}

function updateMeta() {
  boardMeta.innerHTML=`<span class="live-dot"></span>${allNotes.length} idea${allNotes.length!==1?'s':''} on the board`;
}

async function loadNotes() {
  const {data,error}=await db.from('notes').select('*').order('created_at',{ascending:false});
  notesGrid.innerHTML='';
  if (error||!data) { notesGrid.innerHTML=`<div class="empty-state"><div class="empty-icon">⚠️</div><p>couldn't reach the board.<br>try refreshing.</p></div>`; return; }
  allNotes=data;
  updateMeta();
  if (!data.length) { notesGrid.innerHTML=`<div class="empty-state"><div class="empty-icon">💡</div><p>nothing here yet.<br>drop the first idea.</p></div>`; return; }
  data.forEach((note,i)=>setTimeout(()=>renderNote(note),i*45));
}

/* ════════════════════════════════════════════════════════════
   REACTIONS
══════════════════════════════════════════════════════════════ */
async function loadReactions() {
  const {data}=await db.from('reactions').select('note_id,type,fingerprint');
  if (!data) return;
  reactionCounts={};
  myReactions={};
  for (const r of data) {
    if (!reactionCounts[r.note_id]) reactionCounts[r.note_id]={};
    reactionCounts[r.note_id][r.type]=(reactionCounts[r.note_id][r.type]||0)+1;
    if (r.fingerprint===myFingerprint) {
      if (!myReactions[r.note_id]) myReactions[r.note_id]={};
      myReactions[r.note_id][r.type]=true;
    }
  }
}

async function toggleReaction(noteId, type) {
  if (!myFingerprint) return;
  const isActive = myReactions[noteId]?.[type];

  // optimistic update
  if (!reactionCounts[noteId]) reactionCounts[noteId]={};
  if (!myReactions[noteId])    myReactions[noteId]={};

  if (isActive) {
    reactionCounts[noteId][type]=Math.max(0,(reactionCounts[noteId][type]||1)-1);
    myReactions[noteId][type]=false;
  } else {
    reactionCounts[noteId][type]=(reactionCounts[noteId][type]||0)+1;
    myReactions[noteId][type]=true;
  }
  refreshCardFooter(noteId);

  if (isActive) {
    await db.from('reactions').delete().match({note_id:noteId,type,fingerprint:myFingerprint});
  } else {
    await db.from('reactions').upsert({note_id:noteId,type,fingerprint:myFingerprint},{onConflict:'note_id,type,fingerprint'});
  }
}

function refreshCardFooter(noteId) {
  const card=document.querySelector(`[data-id="${noteId}"]`);
  if (!card) return;
  const old=card.querySelector('.note-footer');
  if (old) old.remove();
  card.insertAdjacentHTML('beforeend',buildFooterHtml(noteId));
  const note=allNotes.find(n=>n.id===noteId);
  const title=note?.title||'';
  const btn=card.querySelector('.discuss-btn');
  if (btn) { btn.dataset.title=title; btn.addEventListener('click',()=>openThread(noteId,title)); }
  card.querySelectorAll('.reaction-btn').forEach(b=>b.addEventListener('click',()=>toggleReaction(noteId,b.dataset.type)));
}

function refreshAllFooters() {
  for (const note of allNotes) refreshCardFooter(note.id);
}

/* ════════════════════════════════════════════════════════════
   COMMENT COUNTS
══════════════════════════════════════════════════════════════ */
async function loadCommentCounts() {
  const {data}=await db.from('comments').select('note_id');
  commentCounts={};
  if (!data) return;
  for (const r of data) commentCounts[r.note_id]=(commentCounts[r.note_id]||0)+1;
}

function bumpCommentCount(noteId) {
  commentCounts[noteId]=(commentCounts[noteId]||0)+1;
  refreshCardFooter(noteId);
}

/* ════════════════════════════════════════════════════════════
   THREAD PANEL
══════════════════════════════════════════════════════════════ */
const threadPanel    = document.getElementById('threadPanel');
const threadTitle    = document.getElementById('threadTitle');
const threadMessages = document.getElementById('threadMessages');
const threadTextarea = document.getElementById('threadTextarea');
const threadAuthor   = document.getElementById('threadAuthor');
const threadSend     = document.getElementById('threadSend');

document.getElementById('threadClose').addEventListener('click', closeThread);
document.addEventListener('keydown', e=>{ if(e.key==='Escape') { closeThread(); if(document.getElementById('addModal').classList.contains('open')) closeAddModal(); editModal.classList.remove('open'); } });

function openThread(noteId, title) {
  if (activeThreadId===noteId && threadPanel.classList.contains('open')) { closeThread(); return; }
  activeThreadId=noteId;
  threadTitle.textContent=title||'untitled';
  threadMessages.innerHTML='<div class="thread-empty">loading...</div>';
  threadPanel.classList.add('open');
  loadThreadMessages(noteId);
  subscribeThread(noteId);
}

function closeThread() {
  threadPanel.classList.remove('open');
  activeThreadId=null;
  if (threadChannel) { db.removeChannel(threadChannel); threadChannel=null; }
}

async function loadThreadMessages(noteId) {
  const {data}=await db.from('comments').select('*').eq('note_id',noteId).order('created_at',{ascending:true});
  threadMessages.innerHTML='';
  if (!data?.length) { threadMessages.innerHTML='<div class="thread-empty">no messages yet.<br>start the thread.</div>'; return; }
  data.forEach(m=>appendThreadMsg(m));
  threadMessages.scrollTop=threadMessages.scrollHeight;
}

function appendThreadMsg(msg) {
  const empty=threadMessages.querySelector('.thread-empty');
  if (empty) empty.remove();
  const el=document.createElement('div');
  el.className='thread-msg';
  el.innerHTML=`
    <div class="thread-msg-header">
      <span class="thread-msg-author">${msg.author?escHtml(msg.author):'anonymous'}</span>
      <span class="thread-msg-time">${timeAgo(msg.created_at)}</span>
    </div>
    <div class="thread-msg-content">${escHtml(msg.content)}</div>
  `;
  threadMessages.appendChild(el);
}

function subscribeThread(noteId) {
  if (threadChannel) { db.removeChannel(threadChannel); threadChannel=null; }
  threadChannel=db.channel(`thread:${noteId}`)
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'comments',filter:`note_id=eq.${noteId}`},payload=>{
      appendThreadMsg(payload.new);
      threadMessages.scrollTop=threadMessages.scrollHeight;
    }).subscribe();
}

threadSend.addEventListener('click', sendThreadMessage);
threadTextarea.addEventListener('keydown', e=>{ if(e.key==='Enter' && !e.shiftKey){e.preventDefault();sendThreadMessage();} });

async function sendThreadMessage() {
  const content=threadTextarea.value.trim();
  if (!content||!activeThreadId) return;
  threadSend.disabled=true;
  const {error}=await db.from('comments').insert({
    note_id:activeThreadId, content,
    author:threadAuthor.value.trim()||null,
    fingerprint:myFingerprint,
  });
  threadSend.disabled=false;
  if (error) { showToast('message failed to send'); return; }
  threadTextarea.value='';
  bumpCommentCount(activeThreadId);
}

/* ════════════════════════════════════════════════════════════
   REALTIME SUBSCRIPTIONS
══════════════════════════════════════════════════════════════ */
function subscribeRealtime() {
  // new notes
  db.channel('public:notes')
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'notes'},payload=>{
      if (document.querySelector(`[data-id="${payload.new.id}"]`)) return;
      allNotes.unshift(payload.new);
      renderNote(payload.new, currentSort==='newest');
      updateMeta();
      showToast('new idea just dropped ✦');
    }).subscribe();

  // reactions from other people
  db.channel('public:reactions')
    .on('postgres_changes',{event:'*',schema:'public',table:'reactions'},async payload=>{
      const r=payload.new||payload.old;
      if (!r?.note_id) return;
      // Re-fetch counts for that note only
      const {data}=await db.from('reactions').select('type,fingerprint').eq('note_id',r.note_id);
      if (!data) return;
      reactionCounts[r.note_id]={};
      myReactions[r.note_id]=myReactions[r.note_id]||{};
      for (const rx of data) {
        reactionCounts[r.note_id][rx.type]=(reactionCounts[r.note_id][rx.type]||0)+1;
        if (rx.fingerprint===myFingerprint) myReactions[r.note_id][rx.type]=true;
      }
      refreshCardFooter(r.note_id);
    }).subscribe();
}

/* ════════════════════════════════════════════════════════════
   LIGHTBOX
══════════════════════════════════════════════════════════════ */
const lightbox    = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightboxImg');
function openLightbox(src) { lightboxImg.src=src; lightbox.classList.add('open'); }
lightbox.addEventListener('click',()=>lightbox.classList.remove('open'));

/* ════════════════════════════════════════════════════════════
   HELPERS
══════════════════════════════════════════════════════════════ */
function flash(el) {
  el.style.borderColor='var(--danger)'; el.style.boxShadow='0 0 0 3px rgba(255,74,106,.15)'; el.focus();
  setTimeout(()=>{el.style.borderColor='';el.style.boxShadow=''},1600);
}

const toastEl=document.getElementById('toast');
let toastTimer;
function showToast(msg){ toastEl.textContent=msg; toastEl.classList.add('show'); clearTimeout(toastTimer); toastTimer=setTimeout(()=>toastEl.classList.remove('show'),3000); }
</script>
